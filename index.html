<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrimeHomes - Real Estate Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero-bg {
      background-image: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)), 
                        url('https://source.unsplash.com/random/1920x1080/?luxury-villa');
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-white text-zinc-900">

  <!-- Blue Navbar -->
  <nav class="fixed top-0 w-full bg-blue-700 text-white shadow-lg z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-house text-3xl"></i>
        <span class="text-2xl font-bold tracking-tight">PrimeHomes</span>
      </div>
      
      <div class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a href="#" class="hover:text-blue-200 transition">Buy</a>
        <a href="#" class="hover:text-blue-200 transition">Rent</a>
        <a href="#" class="hover:text-blue-200 transition">Sell</a>
        <a href="#" class="hover:text-blue-200 transition">Projects</a>
        <a href="#" class="hover:text-blue-200 transition">Virtual Tours</a>
      </div>

      <div class="flex items-center gap-4">
        <button onclick="toggleSearch()" class="flex items-center gap-2 px-5 py-2.5 hover:bg-blue-600 rounded-full transition text-sm font-medium">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span class="hidden sm:inline">Search</span>
        </button>
        <button class="bg-white text-blue-700 px-6 py-2.5 rounded-full font-semibold hover:bg-amber-400 hover:text-white transition">
          List Your Property
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="hero-bg h-screen flex items-center pt-20">
    <div class="max-w-5xl mx-auto px-6 text-center text-white">
      <h1 class="text-5xl md:text-7xl font-bold leading-tight mb-6">
        Find Your <span class="text-green-400">Dream Home</span>
      </h1>
      <p class="text-xl md:text-2xl max-w-2xl mx-auto mb-10 text-white/90">
        Premium properties • Secure bookings • Trusted marketplace in Uganda
      </p>

      <div class="max-w-3xl mx-auto bg-white/10 backdrop-blur-md border border-white/30 rounded-3xl p-2">
        <div class="flex flex-col md:flex-row gap-3 bg-white rounded-3xl p-2 shadow-xl">
          <div class="flex-1 flex items-center gap-3 px-6 py-4">
            <i class="fa-solid fa-location-dot text-green-600 text-xl"></i>
            <input type="text" id="search-location" placeholder="Where are you looking? (Kampala, Entebbe...)" 
                   class="bg-transparent flex-1 outline-none placeholder-zinc-500 text-lg"/>
          </div>
          <div class="flex-1 flex items-center gap-3 px-6 py-4 border-t md:border-l border-zinc-200">
            <i class="fa-solid fa-house text-green-600 text-xl"></i>
            <select id="property-type" class="bg-transparent flex-1 outline-none text-lg text-zinc-700">
              <option value="">All Property Types</option>
              <option value="house">House</option>
              <option value="apartment">Apartment</option>
              <option value="villa">Villa</option>
              <option value="land">Land</option>
            </select>
          </div>
          <button onclick="performSearch()" 
                  class="bg-green-600 hover:bg-green-700 text-white font-semibold px-12 py-4 rounded-3xl transition flex items-center gap-3">
            <i class="fa-solid fa-search"></i>
            Search
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Featured Properties -->
  <section class="py-20 bg-white">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-4xl font-semibold text-center mb-12">Featured Properties</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="property-grid"></div>
    </div>
  </section>

  <!-- Blue Footer -->
  <footer class="bg-blue-700 text-white py-16">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <div class="flex items-center justify-center gap-3 mb-6">
        <i class="fa-solid fa-house text-3xl"></i>
        <span class="text-2xl font-bold">PrimeHomes</span>
      </div>
      <p class="text-blue-200">Uganda's trusted real estate marketplace</p>
      <p class="text-blue-300 text-sm mt-8">
        © 2026 PrimeHomes. All rights reserved.
      </p>
    </div>
  </footer>

  <script>
    const properties = [
      { id: 1, title: "Luxury 5-Bedroom Villa", location: "Kololo, Kampala", price: "UGX 1.2B", type: "Villa", image: "https://source.unsplash.com/random/600x400/?villa", beds: 5, baths: 6, area: "850 sqm" },
      { id: 2, title: "Modern 3-Bed Apartment", location: "Bugolobi, Kampala", price: "UGX 450M", type: "Apartment", image: "https://source.unsplash.com/random/600x400/?apartment", beds: 3, baths: 3, area: "320 sqm" },
      { id: 3, title: "Prime Commercial Land", location: "Entebbe Road", price: "UGX 890M", type: "Land", image: "https://source.unsplash.com/random/600x400/?land", beds: 0, baths: 0, area: "2,500 sqm" },
      { id: 4, title: "Family Home in Gated Estate", location: "Muyenga, Kampala", price: "UGX 680M", type: "House", image: "https://source.unsplash.com/random/600x400/?house", beds: 4, baths: 4, area: "620 sqm" }
    ];

    function renderProperties() {
      const grid = document.getElementById('property-grid');
      grid.innerHTML = properties.map(prop => `
        <div class="bg-white border border-zinc-200 rounded-3xl overflow-hidden hover:shadow-2xl transition-all">
          <img src="${prop.image}" class="w-full h-64 object-cover"/>
          <div class="p-6">
            <div class="font-semibold text-xl mb-1">${prop.title}</div>
            <div class="text-green-600">${prop.location}</div>
            <div class="text-2xl font-bold mt-4">${prop.price}</div>
            <button onclick="viewProperty(${prop.id})" class="mt-6 w-full bg-green-600 text-white py-3 rounded-2xl hover:bg-green-700">
              View Details
            </button>
          </div>
        </div>
      `).join('');
    }

    function viewProperty(id) {
      alert("Property #" + id + " details would open here");
    }

    function performSearch() {
      alert("Search will connect to backend later");
    }

    window.onload = renderProperties;
  </script>
</body>
</html>
